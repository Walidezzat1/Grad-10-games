<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيزياء التمويه - أونلاين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .btn-option:active { transform: scale(0.96); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.6); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(139, 92, 246, 0.9); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 sm:p-6 min-h-screen relative">

    <!-- صندوق الرسائل المخصص -->
    <div id="message-box" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 hidden w-[90%] max-w-md"></div>

    <div id="game-app" class="max-w-4xl w-full glass-panel rounded-3xl p-6 sm:p-10 relative min-h-[600px] flex flex-col z-10 shadow-2xl">
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full flex-grow">
            <div class="w-12 h-12 border-4 border-white/10 border-t-purple-500 rounded-full animate-spin mb-6"></div>
            <p class="text-gray-300 text-xl font-bold animate-pulse">جاري الاتصال بخوادم الفيزياء...</p>
        </div>
    </div>
    
    <div class="mt-6 text-slate-400/80 text-sm font-bold text-center z-0 bg-slate-900/50 px-6 py-2 rounded-full border border-slate-700">
        <i class="fas fa-globe text-blue-500 ml-2"></i>
        نسخة اللعب عبر الإنترنت (Multi-player) - إشراف موجه الفيزياء: أ/ وليد عزت
    </div>

    <!-- استدعاء ملف قاعدة البيانات الخاص بك -->
    <script src="physics_database.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // =================================================================
        // جلب قاعدة البيانات من ملف physics_database.js الخارجي
        // =================================================================
        const physicsData = window.physicsData || [];

        if (physicsData.length === 0) {
            console.error("لم يتم العثور على الأسئلة! تأكد من رفع ملف physics_database.js بجانب ملف index.html");
        }

        // =================================================================
        // ⚠️ هام جداً: إعدادات فايربيس (Firebase Config) ⚠️
        // تم دمج إعدادات مشروعك بنجاح
        // =================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDwuxZI6TM570Q_YclhBiCaTJ_lWNLRqPA",
            authDomain: "phy-grad10-games.firebaseapp.com",
            projectId: "phy-grad10-games",
            storageBucket: "phy-grad10-games.firebasestorage.app",
            messagingSenderId: "565212931078",
            appId: "1:565212931078:web:047dc97b5c420c31134f87",
            measurementId: "G-VSHEMMWFEF"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);
        const appId = 'physics-game-online-pro-v6'; // لا تقم بتغيير هذا المعرف
        
        const MAX_PLAYERS = 30; // 30 لاعب كحد أقصى
        let currentUser = null;
        let currentRoomId = null;
        let unsubscribeRoom = null;
        let playerName = localStorage.getItem('physics_player_name') || '';
        
        const appDiv = document.getElementById('game-app');

        // بديل لـ alert يعرض رسائل مخصصة
        function showMessage(msg, type = 'error') {
            const box = document.getElementById('message-box');
            const icon = type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle';
            const bgClass = type === 'error' ? 'bg-red-900/90 border-red-500' : 'bg-emerald-900/90 border-emerald-500';
            
            box.innerHTML = `
                <div class="${bgClass} border text-white px-6 py-4 rounded-xl shadow-2xl font-bold flex items-center justify-center text-center">
                    <i class="fas ${icon} ml-3 text-2xl"></i>
                    <span class="text-lg">${msg}</span>
                </div>
            `;
            box.classList.remove('hidden');
            box.style.animation = 'fadeIn 0.3s ease-out forwards';
            
            setTimeout(() => {
                box.classList.add('hidden');
            }, 4000);
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function getCategoryBadge(category) {
            switch(category) {
                case 'مصطلح علمي': return '<span class="bg-purple-900/90 text-purple-200 px-5 py-2 rounded-full text-sm font-bold shadow-lg border border-purple-500/50"><i class="fas fa-book mr-2"></i> مصطلح علمي</span>';
                case 'أكمل الفراغ': return '<span class="bg-blue-900/90 text-blue-200 px-5 py-2 rounded-full text-sm font-bold shadow-lg border border-blue-500/50"><i class="fas fa-pen mr-2"></i> أكمل الفراغ</span>';
                case 'سؤال مباشر': return '<span class="bg-emerald-900/90 text-emerald-200 px-5 py-2 rounded-full text-sm font-bold shadow-lg border border-emerald-500/50"><i class="fas fa-question-circle mr-2"></i> سؤال مباشر</span>';
                case 'ماذا يحدث': return '<span class="bg-orange-900/90 text-orange-200 px-5 py-2 rounded-full text-sm font-bold shadow-lg border border-orange-500/50"><i class="fas fa-flask mr-2"></i> ماذا يحدث؟</span>';
                default: return '';
            }
        }

        // مصادقة الدخول
        async function initGame() {
            try {
                // تسجيل دخول مجهول لكي يتمكن الجميع من اللعب بدون إنشاء حسابات معقدة
                await signInAnonymously(auth);
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        renderHome();
                    }
                });
            } catch (error) {
                console.error(error);
                appDiv.innerHTML = `<div class="text-center text-red-400 mt-10 font-bold text-xl">حدث خطأ في الاتصال بخوادم Firebase. تأكد من إعداداتك وتفعيل المصادقة (Anonymous).</div>`;
            }
        }

        // الشاشة الرئيسية
        function renderHome() {
            appDiv.innerHTML = `
                <div class="text-center fade-in flex flex-col h-full">
                    <div class="bg-emerald-900/40 text-emerald-300 text-xs sm:text-sm py-2 px-5 rounded-full self-center mb-6 border border-emerald-500/30 flex items-center shadow-sm">
                        <i class="fas fa-wifi mr-2"></i> متصل بالخوادم (${physicsData.length} سؤال جاهز)
                    </div>
                    <div class="relative inline-block mx-auto mb-4">
                        <i class="fas fa-atom text-7xl sm:text-8xl text-purple-400 animate-spin drop-shadow-lg" style="animation-duration: 6s;"></i>
                        <i class="fas fa-bolt text-yellow-400 text-2xl absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
                    </div>
                    <h1 class="text-4xl md:text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 drop-shadow-md">فيزياء التمويه</h1>
                    <p class="text-slate-300 mb-8 text-lg font-bold">تحدي الخداع (أونلاين)! هل يمكنك تضليل أصدقائك؟</p>
                    
                    <div class="mb-6 mt-2 max-w-sm mx-auto w-full">
                        <label class="block text-right text-slate-300 mb-2 text-sm font-bold">اسمك في اللعبة:</label>
                        <input type="text" id="player-name" value="${playerName}" placeholder="اكتب اسمك هنا" class="w-full bg-[#0f172a] border-2 border-purple-500/40 rounded-xl p-4 text-white text-center focus:outline-none focus:border-purple-400 text-xl transition-all shadow-inner font-bold">
                    </div>

                    <div class="grid grid-cols-1 gap-5 mt-auto max-w-sm mx-auto w-full">
                        <button id="btn-create" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-4 rounded-xl shadow-xl transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-center text-xl">
                            <span>إنشاء غرفة جديدة</span> <i class="fas fa-plus-circle mr-2"></i>
                        </button>
                        
                        <div class="relative flex items-center py-2">
                            <div class="flex-grow border-t border-slate-600"></div>
                            <span class="flex-shrink-0 mx-4 text-slate-400 text-sm font-bold">أو الانضمام إلى غرفة</span>
                            <div class="flex-grow border-t border-slate-600"></div>
                        </div>

                        <div class="flex gap-2">
                            <button id="btn-join" class="w-1/3 bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 rounded-xl transition-all flex justify-center items-center active:scale-95 text-xl shadow-lg">
                                انضم <i class="fas fa-sign-in-alt mr-2"></i>
                            </button>
                            <input type="text" id="room-code-input" placeholder="رمز الغرفة" maxlength="4" class="flex-grow w-2/3 bg-[#0f172a] border-2 border-blue-500/40 rounded-xl p-4 text-white text-center focus:outline-none focus:border-blue-400 text-3xl tracking-[0.4em] uppercase transition-all shadow-inner font-mono font-bold">
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('btn-create').onclick = createRoom;
            document.getElementById('btn-join').onclick = () => joinRoom(document.getElementById('room-code-input').value.trim().toUpperCase());
        }

        async function createRoom() {
            const nameInput = document.getElementById('player-name').value.trim();
            if(!nameInput) return showMessage("يرجى كتابة اسمك أولاً ليعرفك الآخرون!");
            playerName = nameInput;
            localStorage.setItem('physics_player_name', playerName);

            const roomId = Math.random().toString(36).substring(2, 6).toUpperCase();
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            
            const initialData = {
                roomId: roomId,
                hostId: currentUser.uid,
                gameState: 'lobby',
                currentQuestion: null,
                usedQuestions: [],
                roundOptions: [],
                players: { [currentUser.uid]: { name: playerName, score: 0, currentFake: "", currentVote: "", isHost: true, roundScore: 0 } }
            };

            try {
                appDiv.innerHTML = `<div class="flex flex-col items-center justify-center h-full"><div class="w-12 h-12 border-4 border-white/10 border-t-purple-500 rounded-full animate-spin mb-6"></div><p class="text-purple-300 font-bold text-xl">جاري إنشاء الغرفة...</p></div>`;
                await setDoc(roomRef, initialData);
                listenToRoom(roomId);
            } catch (error) {
                showMessage("حدث خطأ أثناء إنشاء الغرفة. تأكد من اتصالك بالإنترنت ومن إعدادات Firebase.");
                renderHome();
            }
        }

        async function joinRoom(roomId) {
            if(!roomId || roomId.length !== 4) return showMessage("الرجاء إدخال رمز الغرفة المكون من 4 أحرف/أرقام بشكل صحيح!");
            const nameInput = document.getElementById('player-name').value.trim();
            if(!nameInput) return showMessage("يرجى كتابة اسمك أولاً!");
            playerName = nameInput;
            localStorage.setItem('physics_player_name', playerName);

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            
            try {
                appDiv.innerHTML = `<div class="flex flex-col items-center justify-center h-full"><div class="w-12 h-12 border-4 border-white/10 border-t-blue-500 rounded-full animate-spin mb-6"></div><p class="text-blue-300 font-bold text-xl">جاري البحث عن الغرفة...</p></div>`;
                const snap = await getDoc(roomRef);
                if (!snap.exists()) { 
                    showMessage("الغرفة غير موجودة! تأكد من الرمز المدخل."); 
                    renderHome(); 
                    return; 
                }

                const roomData = snap.data();
                const currentPlayersCount = Object.keys(roomData.players).length;
                
                if (currentPlayersCount >= MAX_PLAYERS && !roomData.players[currentUser.uid]) {
                    showMessage(`عذراً، الغرفة ممتلئة (الحد الأقصى ${MAX_PLAYERS} لاعب).`); 
                    renderHome(); 
                    return;
                }
                
                if (roomData.gameState !== 'lobby' && !roomData.players[currentUser.uid]) {
                     showMessage("اللعبة بدأت بالفعل في هذه الغرفة. لا يمكنك الانضمام في منتصف الجولة."); 
                     renderHome(); 
                     return;
                }

                await updateDoc(roomRef, {
                    [`players.${currentUser.uid}`]: { 
                        name: playerName, 
                        score: roomData.players[currentUser.uid]?.score || 0,
                        currentFake: roomData.players[currentUser.uid]?.currentFake || "", 
                        currentVote: roomData.players[currentUser.uid]?.currentVote || "", 
                        isHost: roomData.hostId === currentUser.uid,
                        roundScore: roomData.players[currentUser.uid]?.roundScore || 0
                    }
                });
                listenToRoom(roomId);
            } catch(error) {
                 showMessage("فشل الانضمام للغرفة."); 
                 renderHome();
            }
        }

        function listenToRoom(roomId) {
            currentRoomId = roomId;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            if (unsubscribeRoom) unsubscribeRoom();
            
            unsubscribeRoom = onSnapshot(roomRef, (docSnap) => {
                if (!docSnap.exists()) { 
                    showMessage("تم إنهاء الغرفة بواسطة المضيف."); 
                    renderHome(); 
                    return; 
                }
                
                const data = docSnap.data();
                if (!data.players[currentUser.uid]) return;

                const isHost = data.hostId === currentUser.uid;
                
                // المضيف يتحقق تلقائياً من اكتمال الإجابات
                if (isHost) hostAutomations(data, roomRef);

                switch(data.gameState) {
                    case 'lobby': renderLobby(data, isHost); break;
                    case 'write': renderWrite(data); break;
                    case 'vote': renderVote(data); break;
                    case 'results': renderResults(data, isHost); break;
                }
            }, (error) => {
                console.error("Firebase Snapshot Error:", error);
                showMessage("حدث خطأ في الاتصال بقاعدة البيانات.");
            });
        }

        async function hostAutomations(data, roomRef) {
            const ObjectPlayers = data.players;
            const playersArr = Object.values(ObjectPlayers);
            const totalPlayers = playersArr.length;
            
            if (data.gameState === 'write') {
                const playersWhoWrote = playersArr.filter(p => p.currentFake !== "");
                // الانتقال التلقائي إذا أجاب الجميع
                if (playersWhoWrote.length === totalPlayers && totalPlayers > 0) {
                    forceNextPhaseInternal(data, roomRef);
                }
            } 
            else if (data.gameState === 'vote') {
                const playersWhoVoted = playersArr.filter(p => p.currentVote !== "");
                // الانتقال التلقائي إذا صوت الجميع
                if (playersWhoVoted.length === totalPlayers && totalPlayers > 0) {
                    forceNextPhaseInternal(data, roomRef);
                }
            }
        }

        // دالة المضيف لتخطي الغائبين أو الانتقال اليدوي للمرحلة التالية
        window.forceNextPhase = async function() {
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            const snap = await getDoc(roomRef);
            if(snap.exists()) {
                forceNextPhaseInternal(snap.data(), roomRef);
            }
        };

        // المنطق الداخلي للانتقال للمرحلة التالية (يستدعى تلقائياً أو يدوياً)
        async function forceNextPhaseInternal(data, roomRef) {
            const ObjectPlayers = data.players;
            const playersArr = Object.values(ObjectPlayers);

            if (data.gameState === 'write') {
                let options = [{ text: data.currentQuestion.answer, isReal: true, author: "الفيزياء" }];
                const uniqueFakes = new Set();
                
                playersArr.forEach(p => {
                    // نأخذ فقط الفخاخ التي تم كتابتها بالفعل (نتجاهل من لم يكتب)
                    if (p.currentFake && !uniqueFakes.has(p.currentFake.toLowerCase())) {
                        options.push({ text: p.currentFake, isReal: false, author: p.name });
                        uniqueFakes.add(p.currentFake.toLowerCase());
                    }
                });
                
                await updateDoc(roomRef, { gameState: 'vote', roundOptions: shuffle(options) });
            } 
            else if (data.gameState === 'vote') {
                let updatedPlayers = { ...data.players };
                
                // تصفير نقاط الجولة الحالية للجميع استعداداً لحسابها
                for(let uid in updatedPlayers) {
                    updatedPlayers[uid].roundScore = 0;
                }

                playersArr.forEach(p => {
                    // نحسب النقاط فقط لمن قام بالتصويت
                    if(p.currentVote !== "") {
                        const votedOption = data.roundOptions.find(o => o.text === p.currentVote);
                        if (votedOption && votedOption.isReal) {
                            updatedPlayers[p.uid].score += 10; 
                            updatedPlayers[p.uid].roundScore += 10; 
                        } else if (votedOption && !votedOption.isReal) {
                            const tricksterUid = Object.keys(ObjectPlayers).find(uid => ObjectPlayers[uid].name === votedOption.author);
                            if (tricksterUid && tricksterUid !== p.uid) {
                                updatedPlayers[tricksterUid].score += 15; 
                                updatedPlayers[tricksterUid].roundScore += 15; 
                            }
                        }
                    }
                });
                
                await updateDoc(roomRef, { gameState: 'results', players: updatedPlayers });
            }
        }

        function renderLobby(data, isHost) {
            const playersArr = Object.values(data.players);
            const playersList = playersArr.map(p => 
                `<div class="bg-slate-800/80 border border-slate-600 p-3 rounded-xl flex items-center text-sm truncate shadow-sm transition-transform transform hover:-translate-y-1">
                    <i class="fas ${p.isHost ? 'fa-crown text-yellow-400' : 'fa-user text-blue-400'} ml-3 text-xl"></i> 
                    <span class="truncate font-bold text-slate-100 text-base">${p.name}</span>
                </div>`
            ).join('');

            appDiv.innerHTML = `
                <div class="fade-in flex flex-col h-full">
                    <div class="text-center mb-6 bg-gradient-to-r from-purple-900/40 to-blue-900/40 p-6 rounded-3xl border border-purple-500/30 shadow-inner">
                        <h2 class="text-sm text-purple-300 uppercase tracking-widest mb-3 font-bold"><i class="fas fa-key mr-2"></i> رمز الغرفة الخاص بك</h2>
                        <div class="text-6xl md:text-7xl font-black tracking-[0.25em] text-white cursor-pointer hover:text-purple-400 transition-colors drop-shadow-md font-mono" 
                             onclick="document.execCommand('copy'); navigator.clipboard.writeText('${data.roomId}').catch(()=>true); showMessage('تم نسخ رمز الغرفة', 'success');">
                            ${data.roomId}
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-end mb-4 px-2 border-b border-slate-700 pb-3">
                        <h3 class="text-xl font-bold text-slate-200">العلماء المتصلون</h3>
                        <span class="bg-blue-600/30 text-blue-300 text-sm px-4 py-1.5 rounded-full font-bold border border-blue-500/30">${playersArr.length} / ${MAX_PLAYERS}</span>
                    </div>
                    
                    <div class="flex-grow overflow-y-auto mb-6 custom-scrollbar p-2">
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${playersList}</div>
                        ${playersArr.length === 1 ? '<div class="text-center text-slate-500 mt-10"><i class="fas fa-user-clock text-5xl mb-4 block opacity-50"></i> <p class="text-lg font-bold">أنت وحدك هنا.. شارك الرمز مع أصدقائك لينضموا.</p></div>' : ''}
                    </div>
                    
                    <div class="mt-auto flex-shrink-0">
                        ${isHost ? `
                            <button onclick="window.startOnlineRound()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-5 rounded-2xl shadow-xl transition-all transform hover:scale-[1.02] active:scale-95 text-2xl" ${playersArr.length < 2 ? 'disabled style="opacity:0.5; filter:grayscale(1);"' : ''}>
                                ابدأ التحدي الآن <i class="fas fa-play mr-2"></i>
                            </button>
                        ` : `
                            <div class="bg-amber-900/30 border border-amber-700/50 text-amber-300 p-5 rounded-2xl text-center font-bold flex items-center justify-center text-xl shadow-inner">
                                <i class="fas fa-circle-notch fa-spin ml-4 text-2xl"></i>
                                <span>في انتظار المضيف لبدء اللعبة...</span>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        window.startOnlineRound = async function() {
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            const snap = await getDoc(roomRef);
            const roomData = snap.data();
            
            if (Object.keys(roomData.players).length < 2) return showMessage("الفيزياء ممتعة أكثر مع الأصدقاء! لا يمكنك اللعب وحدك.");

            // استبعاد الأسئلة التي تم لعبها في هذه الغرفة سابقاً
            let used = roomData.usedQuestions || [];
            let availableQs = physicsData.filter(q => !used.includes(q.prompt));
            
            // إذا انتهت جميع الأسئلة المتاحة، نقوم بتصفير القائمة لتبدأ من جديد
            if (availableQs.length === 0) {
                used = [];
                availableQs = physicsData;
            }

            const qIndex = Math.floor(Math.random() * availableQs.length);
            const question = availableQs[qIndex];
            used.push(question.prompt);
            
            const players = roomData.players;
            let resetPlayers = {};
            for(let uid in players) {
                resetPlayers[uid] = { ...players[uid], currentFake: "", currentVote: "", roundScore: 0 };
            }

            const btn = document.querySelector('button');
            if(btn) btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إعداد الجولة...';
            
            await updateDoc(roomRef, { gameState: 'write', currentQuestion: question, usedQuestions: used, roundOptions: [], players: resetPlayers });
        };

        function renderWrite(data) {
            const myData = data.players[currentUser.uid];
            const isHost = data.hostId === currentUser.uid;
            const totalPlayers = Object.keys(data.players).length;
            const submittedCount = Object.values(data.players).filter(p => p.currentFake !== "").length;
            
            if (myData.currentFake !== "") {
                // زر تخطي للمضيف في حال أراد إنهاء الوقت لمن لم يجاوب
                const forceSkipBtn = isHost ? `
                    <button onclick="window.forceNextPhase()" class="mt-8 px-6 py-3 bg-red-600/80 hover:bg-red-500 text-white rounded-xl font-bold transition-all border border-red-400 text-sm">
                        <i class="fas fa-forward ml-2"></i>تخطي الغائبين والانتقال للتصويت
                    </button>` : '';

                appDiv.innerHTML = `
                    <div class="fade-in flex flex-col justify-center items-center h-full text-center">
                        <div class="w-28 h-28 bg-green-900/40 rounded-full flex items-center justify-center mb-8 border-4 border-green-500 shadow-[0_0_40px_rgba(34,197,94,0.4)]">
                            <i class="fas fa-check text-6xl text-green-400"></i>
                        </div>
                        <h2 class="text-4xl font-black mb-6 text-white">تم إرسال فخك بنجاح!</h2>
                        <div class="w-full max-w-sm bg-slate-800 rounded-full h-4 mb-4 overflow-hidden border border-slate-700 shadow-inner">
                            <div class="bg-gradient-to-r from-purple-500 to-pink-500 h-full transition-all duration-700" style="width: ${(submittedCount / totalPlayers) * 100}%"></div>
                        </div>
                        <p class="text-slate-300 text-xl font-bold">في انتظار البقية (${submittedCount}/${totalPlayers})</p>
                        ${forceSkipBtn}
                    </div>
                `;
                return;
            }

            const categoryBadge = getCategoryBadge(data.currentQuestion.category);

            appDiv.innerHTML = `
                <div class="fade-in flex flex-col h-full flex-grow relative">
                    <div class="absolute top-0 right-0 left-0 -mt-6 -mx-6 sm:-mt-10 sm:-mx-10 h-1.5 bg-slate-800">
                        <div class="bg-purple-500 h-full transition-all duration-500" style="width: ${(submittedCount / totalPlayers) * 100}%"></div>
                    </div>

                    <div class="flex justify-between items-center mb-6 mt-4">
                        <div class="flex items-center bg-slate-800/80 px-4 py-2 rounded-full border border-slate-600 shadow-sm">
                            <i class="fas fa-user-circle text-purple-400 ml-2 text-xl"></i>
                            <span class="font-bold text-base text-slate-100">${myData.name}</span>
                        </div>
                        <div class="bg-yellow-900/40 px-4 py-2 rounded-full border border-yellow-700/50 shadow-sm">
                            <span class="text-yellow-400 font-black text-lg mr-1">${myData.score}</span> <i class="fas fa-star text-yellow-500"></i>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-slate-800 to-[#0f172a] border border-blue-500/30 p-8 rounded-3xl mb-8 shadow-2xl text-center relative flex-shrink-0 mt-4">
                        <div class="absolute -top-5 left-1/2 transform -translate-x-1/2">${categoryBadge}</div>
                        <p class="text-2xl md:text-3xl leading-relaxed font-bold text-white mt-6 drop-shadow-md">"${data.currentQuestion.prompt}"</p>
                    </div>

                    <div class="mt-auto bg-slate-900/90 p-6 rounded-3xl border border-slate-700 shadow-inner">
                        <p class="text-base text-slate-300 mb-4 font-bold text-center">
                            <i class="fas fa-lightbulb text-yellow-400 ml-2 text-xl"></i> اكتب <span class="text-red-400 border-b-2 border-red-400 pb-1">إجابة مزيفة</span> ومقنعة لتخدع بها البقية:
                        </p>
                        <input type="text" id="fake-input" autocomplete="off" placeholder="اكتب فخك الفيزيائي هنا..." class="w-full bg-black/60 border-2 border-purple-500/50 rounded-2xl p-5 text-white text-center text-2xl mb-5 focus:outline-none focus:border-purple-400 transition-all font-bold shadow-inner placeholder-slate-600">
                        <button onclick="window.submitOnlineFake()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl transition-transform transform hover:scale-[1.02] active:scale-95 text-2xl">
                            أرسل الفخ سراً <i class="fas fa-paper-plane mr-2"></i>
                        </button>
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                const input = document.getElementById('fake-input');
                if(input) {
                    input.focus();
                    input.addEventListener("keypress", (e) => { if (e.key === "Enter") window.submitOnlineFake(); });
                }
            }, 100);
        }

        window.submitOnlineFake = async function() {
            const input = document.getElementById('fake-input');
            const val = input.value.trim();
            if (!val) {
                input.classList.add('border-red-500', 'animate-pulse');
                setTimeout(() => input.classList.remove('border-red-500', 'animate-pulse'), 800);
                return;
            }

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            const snap = await getDoc(roomRef);
            const roomData = snap.data();
            if(roomData.gameState !== 'write') return;

            if (val.toLowerCase() === roomData.currentQuestion.answer.toLowerCase()) {
                showMessage("لقد كتبت الإجابة الصحيحة بالصدفة! الهدف هو كتابة إجابة خاطئة لتخدع أصدقائك.");
                input.value = "";
                return;
            }

            const btn = document.querySelector('button');
            if(btn) { btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري الإرسال...'; btn.disabled = true; }
            await updateDoc(roomRef, { [`players.${currentUser.uid}.currentFake`]: val });
        };

        function renderVote(data) {
            const myData = data.players[currentUser.uid];
            const isHost = data.hostId === currentUser.uid;
            const totalPlayers = Object.keys(data.players).length;
            const votedCount = Object.values(data.players).filter(p => p.currentVote !== "").length;

            if (myData.currentVote !== "") {
                const forceSkipBtn = isHost ? `
                    <button onclick="window.forceNextPhase()" class="mt-8 px-6 py-3 bg-red-600/80 hover:bg-red-500 text-white rounded-xl font-bold transition-all border border-red-400 text-sm">
                        <i class="fas fa-forward ml-2"></i>تخطي الغائبين وإظهار النتائج
                    </button>` : '';

                appDiv.innerHTML = `
                    <div class="fade-in flex flex-col justify-center items-center h-full text-center">
                        <div class="w-28 h-28 bg-blue-900/40 rounded-full flex items-center justify-center mb-8 border-4 border-blue-500 shadow-[0_0_40px_rgba(59,130,246,0.4)]">
                            <i class="fas fa-vote-yea text-6xl text-blue-400"></i>
                        </div>
                        <h2 class="text-4xl font-black mb-6 text-white">تم تسجيل تصويتك!</h2>
                        <div class="w-full max-w-sm bg-slate-800 rounded-full h-4 mb-4 overflow-hidden border border-slate-700 shadow-inner">
                            <div class="bg-gradient-to-r from-blue-500 to-cyan-500 h-full transition-all duration-700" style="width: ${(votedCount / totalPlayers) * 100}%"></div>
                        </div>
                        <p class="text-slate-300 text-xl font-bold">في انتظار تصويت البقية (${votedCount}/${totalPlayers})</p>
                        ${forceSkipBtn}
                    </div>
                `;
                return;
            }

            let buttonsHtml = '';
            data.roundOptions.forEach((opt) => {
                const isOwnFake = opt.author === myData.name;
                const disableClass = isOwnFake ? 'opacity-40 pointer-events-none bg-slate-900 border-dashed border-slate-600' : 'hover:bg-slate-700 hover:border-blue-400/80 cursor-pointer bg-slate-800/90 border-slate-500 shadow-lg transform hover:-translate-y-1 active:scale-95';
                buttonsHtml += `
                    <div ${isOwnFake ? '' : `onclick="window.submitOnlineVote('${opt.text.replace(/'/g, "\\'")}')"`} 
                         class="border-2 p-5 rounded-2xl text-xl md:text-2xl font-bold text-center transition-all duration-200 ${disableClass} flex flex-col items-center justify-center min-h-[90px]">
                        <span class="text-white drop-shadow-sm">${opt.text}</span>
                        ${isOwnFake ? '<span class="text-sm text-red-400 mt-2 bg-red-900/20 px-3 py-1 rounded-md"><i class="fas fa-ban ml-1"></i> هذا فخك الخاص</span>' : ''}
                    </div>
                `;
            });

            const categoryBadge = getCategoryBadge(data.currentQuestion.category);

            appDiv.innerHTML = `
                <div class="fade-in flex flex-col h-full flex-grow relative overflow-hidden">
                    <div class="absolute top-0 right-0 left-0 -mt-6 -mx-6 sm:-mt-10 sm:-mx-10 h-1.5 bg-slate-800 z-20">
                        <div class="bg-blue-500 h-full transition-all duration-500" style="width: ${(votedCount / totalPlayers) * 100}%"></div>
                    </div>

                    <div class="bg-gradient-to-br from-slate-800 to-[#0f172a] border border-blue-500/30 p-6 sm:p-8 rounded-3xl mb-6 shadow-2xl text-center mt-6 relative flex-shrink-0">
                        <div class="absolute -top-5 left-1/2 transform -translate-x-1/2">${categoryBadge}</div>
                        <p class="text-2xl md:text-3xl leading-relaxed font-bold mt-4 text-white drop-shadow-md">"${data.currentQuestion.prompt}"</p>
                    </div>

                    <div class="text-center mb-5 flex-shrink-0">
                        <span class="inline-flex items-center text-base text-yellow-400 bg-yellow-900/20 px-6 py-2 rounded-full animate-pulse font-bold border border-yellow-700/30 shadow-sm">
                            <i class="fas fa-search ml-2 text-xl"></i> ابحث عن الإجابة الحقيقية واحذر الفخاخ!
                        </span>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2 flex-grow overflow-y-auto custom-scrollbar p-2 pb-6 content-start">
                        ${buttonsHtml}
                    </div>
                </div>
            `;
        }

        window.submitOnlineVote = async function(selectedText) {
            appDiv.innerHTML = `<div class="flex flex-col justify-center items-center h-full"><div class="w-12 h-12 border-4 border-white/10 border-t-blue-500 rounded-full animate-spin mb-4"></div><p class="font-bold text-blue-300 text-xl">جاري تسجيل التصويت...</p></div>`;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            await updateDoc(roomRef, { [`players.${currentUser.uid}.currentVote`]: selectedText });
        };

        function renderResults(data, isHost) {
            const playersArr = Object.values(data.players);
            const correctVoters = [];
            const tricksterMap = {};

            const myData = data.players[currentUser.uid];
            const myRoundScore = myData.roundScore || 0;

            playersArr.forEach(p => {
                const votedOption = data.roundOptions.find(o => o.text === p.currentVote);
                if (votedOption) {
                    if (votedOption.isReal) correctVoters.push(p.name);
                    else {
                        if (!tricksterMap[votedOption.author]) tricksterMap[votedOption.author] = { text: votedOption.text, victims: [] };
                        tricksterMap[votedOption.author].victims.push(p.name);
                    }
                }
            });

            let correctHtml = correctVoters.length > 0 ? 
                `<div class="bg-gradient-to-r from-emerald-900/40 to-teal-900/40 border border-emerald-500/40 p-5 rounded-2xl mb-6 shadow-lg">
                    <div class="text-emerald-400 font-bold mb-4 flex items-center text-lg uppercase tracking-wide"><i class="fas fa-check-circle ml-2 text-2xl"></i> أذكياء الجولة (+10 نقاط):</div>
                    <div class="flex flex-wrap gap-3">${correctVoters.map(n => `<span class="bg-black/60 text-lg px-4 py-2 rounded-xl text-white font-bold border border-emerald-500/30 shadow-sm">${n}</span>`).join('')}</div>
                </div>` : 
                `<div class="text-center text-red-400 text-xl mb-6 bg-red-900/20 p-5 rounded-2xl border border-red-500/30 font-bold shadow-md"><i class="fas fa-brain text-4xl mb-3 block"></i> الجولة صعبة! لم ينجح أحد في معرفة الإجابة الصحيحة.</div>`;

            let trapsHtml = Object.keys(tricksterMap).length > 0 ? Object.keys(tricksterMap).map(author => {
                const info = tricksterMap[author];
                return `<div class="bg-slate-800/90 border-r-4 border-purple-500 p-5 rounded-2xl mb-4 shadow-md">
                            <div class="flex justify-between items-start mb-3">
                                <span class="font-bold text-purple-300 text-xl md:text-2xl drop-shadow-sm">"${info.text}"</span>
                                <span class="text-yellow-400 text-sm font-bold bg-yellow-900/50 border border-yellow-600/30 px-3 py-1.5 rounded-lg shadow-sm">+${info.victims.length * 15} لـ ${author}</span>
                            </div>
                            <div class="text-base text-slate-300 bg-black/30 p-3 rounded-xl border border-white/5"><span class="text-red-400 font-bold"><i class="fas fa-skull-crossbones ml-1"></i> الضحايا:</span> ${info.victims.join('، ')}</div>
                        </div>`;
            }).join('') : `<div class="bg-slate-800/60 border border-slate-700 p-5 rounded-2xl text-center text-slate-400 font-bold text-lg">لم يقع أحد في أي فخ هذه الجولة.</div>`;

            let sortedPlayers = [...playersArr].sort((a,b) => b.score - a.score);
            let leaderboardHtml = sortedPlayers.slice(0, 5).map((p, i) => {
                let crown = i === 0 ? '<i class="fas fa-crown text-yellow-400 absolute -top-4 -right-3 transform rotate-12 text-3xl drop-shadow-lg z-10"></i>' : '';
                let borderClass = i === 0 ? 'border-yellow-500/60 shadow-[0_0_20px_rgba(234,179,8,0.25)] bg-slate-800 scale-105' : 'border-slate-600 bg-slate-800/60';
                return `
                <div class="relative text-center px-4 py-4 rounded-2xl border-2 ${borderClass} min-w-[85px] flex-grow sm:flex-grow-0 transition-transform">
                    ${crown}
                    <div class="font-bold text-sm truncate max-w-[90px] text-slate-300 mb-1" title="${p.name}">${p.name}</div>
                    <div class="text-2xl md:text-3xl font-black text-white">${p.score}</div>
                </div>
            `}).join('');

            const categoryBadge = getCategoryBadge(data.currentQuestion.category);

            const personalScoreHtml = `
                <div class="bg-gradient-to-r ${myRoundScore > 0 ? 'from-yellow-600/40 to-yellow-800/40 border-yellow-500/50' : 'from-slate-700/40 to-slate-800/40 border-slate-600/50'} border-2 p-5 rounded-3xl mb-2 text-center shadow-xl transform transition-all hover:scale-[1.02] flex-shrink-0 mt-4">
                    <h3 class="text-2xl md:text-3xl font-black ${myRoundScore > 0 ? 'text-yellow-400 drop-shadow-md' : 'text-slate-300'} mb-2">
                       ${myRoundScore > 0 ? `<i class="fas fa-star mr-2"></i> رائع! كسبت +${myRoundScore} نقطة في هذه الجولة <i class="fas fa-star ml-2"></i>` : `<i class="fas fa-sad-tear mr-2"></i> لم تكسب أي نقاط هذه الجولة`}
                    </h3>
                    <p class="text-white font-bold text-lg md:text-xl">إجمالي نقاطك الآن: <span class="${myRoundScore > 0 ? 'text-yellow-400' : 'text-white'} text-2xl md:text-3xl font-black ml-1">${myData.score}</span></p>
                </div>
            `;

            appDiv.innerHTML = `
                <div class="fade-in flex flex-col h-full overflow-hidden">
                    
                    ${personalScoreHtml}

                    <div class="bg-gradient-to-r from-emerald-900/40 to-teal-900/40 border border-emerald-500/50 p-6 rounded-3xl mb-6 text-center relative mt-4 shadow-xl flex-shrink-0">
                        <div class="absolute -top-4 left-1/2 transform -translate-x-1/2">${categoryBadge}</div>
                        <p class="text-emerald-300/90 text-sm mb-2 uppercase tracking-widest mt-3 font-bold">الإجابة الحقيقية هي:</p>
                        <p class="text-3xl md:text-4xl font-black text-emerald-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">${data.currentQuestion.answer}</p>
                    </div>

                    <div class="flex-grow overflow-y-auto custom-scrollbar pr-2 mb-4">
                        ${correctHtml}
                        
                        <div class="flex items-center mb-4 mt-6">
                            <i class="fas fa-spider text-purple-400 ml-3 text-2xl"></i>
                            <h3 class="text-lg font-black text-slate-200 uppercase tracking-wider drop-shadow-sm">تحليل الفخاخ الذكية</h3>
                        </div>
                        <div class="mb-8">${trapsHtml}</div>
                        
                        <div class="flex items-center mb-5 border-t border-slate-700 pt-6">
                            <i class="fas fa-trophy text-yellow-500 ml-3 text-2xl"></i>
                            <h3 class="text-lg font-black text-yellow-500/90 uppercase tracking-wider">لوحة الشرف (أفضل ${Math.min(5, playersArr.length)})</h3>
                        </div>
                        <div class="flex flex-wrap justify-center gap-4 pb-6">${leaderboardHtml}</div>
                    </div>

                    <div class="mt-auto pt-4 border-t border-slate-700 flex-shrink-0">
                        ${isHost ? `<button onclick="window.startOnlineRound()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-5 rounded-2xl shadow-xl transition-transform transform hover:scale-[1.02] active:scale-95 text-2xl">بدء الجولة التالية <i class="fas fa-forward mr-2"></i></button>` 
                                 : `<div class="bg-slate-800/80 border border-slate-700 p-5 rounded-2xl text-center shadow-inner flex justify-center items-center"><i class="fas fa-circle-notch fa-spin ml-3 text-slate-400 text-2xl"></i><span class="text-slate-300 font-bold text-lg">في انتظار المضيف لبدء الجولة...</span></div>`}
                    </div>
                </div>
            `;
        }

        window.onload = initGame;
    </script>
</body>
</html>
